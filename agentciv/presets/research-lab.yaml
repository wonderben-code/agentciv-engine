# AgentCiv Engine — Research Lab Preset
#
# Exploratory and divergent. Agents pursue different approaches in
# parallel, then converge to share findings. High information sharing,
# low coordination overhead. Groups form around ideas, not assignments.
# Good for problems where the solution space is unknown.

organization:
  authority: "flat"
  communication: "mesh"
  roles: "emergent"
  decisions: "consensus"
  incentives: "collaborative"
  information: "transparent"
  conflict: "voted"
  groups: "task-based"
  adaptation: "evolving"

parameters:
  communication_range: "all"
  message_visibility: "all"
  task_claim_mode: "voluntary"
  require_review: false
  enable_specialisation: true
  max_messages_per_tick: 8
  max_steps_per_tick: 6
  max_concurrent_tasks: 3
