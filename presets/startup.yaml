# AgentCiv Engine — Startup Preset
#
# Move fast and break things. Flat authority, rapid iteration, minimal
# process. Agents self-organise aggressively. No review gates, no formal
# task assignment. Everyone can see and do everything. Speed over polish.
# Good for prototyping and exploration.

organization:
  authority: "flat"
  communication: "broadcast"
  roles: "fluid"
  decisions: "autonomous"
  incentives: "collaborative"
  information: "transparent"
  conflict: "negotiated"
  groups: "self-selected"
  adaptation: "real-time"

parameters:
  communication_range: "all"
  message_visibility: "all"
  task_claim_mode: "voluntary"
  require_review: false
  enable_specialisation: true
  max_messages_per_tick: 10
  max_steps_per_tick: 6
