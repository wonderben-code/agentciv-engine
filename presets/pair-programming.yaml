# AgentCiv Engine — Pair Programming Preset
#
# Two agents work as a pair. One writes code, the other reviews and
# tests. Tight feedback loop, direct communication only. Roles rotate
# after each major milestone. Designed for 2 agents.

organization:
  authority: "rotating"
  communication: "whisper"
  roles: "rotating"
  decisions: "consensus"
  incentives: "collaborative"
  information: "transparent"
  conflict: "negotiated"
  groups: "self-selected"
  adaptation: "cyclical"

parameters:
  communication_range: "direct-only"
  message_visibility: "direct-only"
  task_claim_mode: "voluntary"
  require_review: true
  review_mode: "peer"
  min_reviewers: 1
  enable_specialisation: false
  max_messages_per_tick: 5
